<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --card: #1c1c27;
            --border: #2a2a3d;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --danger: #ff4757;
            --warning: #ffa502;
            --text: #e8e8f0;
            --muted: #6b6b8a;
            --white: #ffffff;
        }
 
        * { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108, 99, 255, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0, 212, 170, 0.06), transparent);
        }
 
        /* NAV */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
 
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
 
        .nav-brand .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
 
        .nav-links {
            display: flex;
            gap: 8px;
        }
 
        .nav-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.88rem;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 7px;
            border: none;
            cursor: pointer;
        }
 
        .nav-btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
        }
 
        .nav-btn-ghost:hover {
            background: var(--card);
            color: var(--text);
            border-color: var(--border);
        }
 
        .nav-btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b83ff);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }
 
        .nav-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.45);
            color: var(--white);
        }
 
        /* PAGE WRAPPER */
        .page-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }
 
        /* CARD */
        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
 
        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        .page-content > * {
            animation: fadeUp 0.4s ease forwards;
        }
 
        /* BUTTONS */
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #8b83ff);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
 
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
            color: var(--white);
        }
 
        .btn-teal {
            background: linear-gradient(135deg, var(--accent2), #00b894);
            color: #0a0a0f;
            border: none;
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
 
        .btn-teal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.35);
            color: #0a0a0f;
        }
 
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
 
        .btn-ghost:hover {
            background: var(--surface);
            color: var(--text);
            border-color: var(--accent);
        }
 
        .btn-danger-soft {
            background: rgba(255, 71, 87, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
 
        .btn-danger-soft:hover {
            background: var(--danger);
            color: var(--white);
            border-color: var(--danger);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.35);
        }
 
        .btn-warning-soft {
            background: rgba(255, 165, 2, 0.12);
            color: var(--warning);
            border: 1px solid rgba(255, 165, 2, 0.3);
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
 
        .btn-warning-soft:hover {
            background: var(--warning);
            color: #0a0a0f;
            border-color: var(--warning);
        }
 
        /* FORMS */
        .form-label {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
 
        .form-control {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 11px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
 
        .form-control:focus {
            background: var(--surface);
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
            outline: none;
        }
 
        .form-control::placeholder { color: var(--muted); }
 
        /* BADGES */
        .badge-price {
            background: linear-gradient(135deg, var(--accent2), #00b894);
            color: #0a0a0f;
            font-weight: 700;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
 
    <nav class="top-nav">
        <a href="{% url 'phone_list' %}" class="nav-brand">
            <div class="brand-icon">📱</div>
            PhoneStore
        </a>
        <div class="nav-links">
            <a href="{% url 'phone_list' %}" class="nav-btn nav-btn-ghost">
                <i class="bi bi-grid-3x3-gap"></i> Ro'yxat
            </a>
            <a href="{% url 'phone_create' %}" class="nav-btn nav-btn-primary">
                <i class="bi bi-plus-lg"></i> Yangi qo'shish
            </a>
        </div>
    </nav>
 
    <div class="page-content">
        {% block content %}
        {% endblock %}
    </div>
 
</body>
</html>
