{% extends 'base.html' %}
 
{% block content %}
<div style="max-width: 540px; margin: 0 auto;">
    <div style="margin-bottom: 2rem;">
        <p style="color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Ombor</p>
        <h1 style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.9rem; color: var(--white); letter-spacing: -0.5px;">
            Yangi telefon qo'shish
        </h1>
    </div>
 
    <div class="glass-card">
        <div style="padding: 28px;">
            <form method="POST">
                {% csrf_token %}
 
                <div style="margin-bottom: 20px;">
                    <label class="form-label"><i class="bi bi-phone" style="color: var(--accent);"></i> &nbsp;Telefon nomi</label>
                    <input type="text" name="title" class="form-control" placeholder="Masalan: Samsung Galaxy A54" required>
                </div>
 
                <div style="margin-bottom: 20px;">
                    <label class="form-label"><i class="bi bi-card-text" style="color: var(--accent);"></i> &nbsp;Tavsifi</label>
                    <input type="text" name="description" class="form-control" placeholder="Masalan: 8GB RAM, 256GB xotira" required>
                </div>
 
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                    <div>
                        <label class="form-label"><i class="bi bi-cash-stack" style="color: var(--accent2);"></i> &nbsp;Narxi (mln)</label>
                        <input type="number" name="price" step="0.01" class="form-control" placeholder="2.5" required>
                    </div>
                    <div>
                        <label class="form-label"><i class="bi bi-boxes" style="color: var(--accent2);"></i> &nbsp;Miqdori</label>
                        <input type="number" name="quantity" class="form-control" placeholder="10" required>
                    </div>
                </div>
 
                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn-teal" style="flex: 1; justify-content: center; padding: 13px;">
                        <i class="bi bi-check-circle-fill"></i> Bazaga saqlash
                    </button>
                    <a href="{% url 'phone_list' %}" class="btn-ghost" style="padding: 13px 20px;">
                        <i class="bi bi-x-lg"></i> Bekor
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
