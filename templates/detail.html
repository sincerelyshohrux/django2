{% extends 'base.html' %}
 
{% block content %}
<div style="max-width: 520px; margin: 0 auto;">
    <a href="{% url 'phone_list' %}" style="display: inline-flex; align-items: center; gap: 7px; color: var(--muted); text-decoration: none; font-size: 0.88rem; margin-bottom: 1.5rem; transition: color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
        <i class="bi bi-arrow-left"></i> Ro'yxatga qaytish
    </a>
 
    <div class="glass-card">
        <!-- Header -->
        <div style="padding: 28px 28px 0; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <div style="width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0;">📱</div>
                <div>
                    <h2 style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--white); letter-spacing: -0.3px; margin-bottom: 4px;">{{ phon.title }}</h2>
                    <p style="color: var(--muted); font-size: 0.9rem; margin: 0;">{{ phon.description }}</p>
                </div>
            </div>
        </div>
 
        <!-- Stats -->
        <div style="padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; border-bottom: 1px solid var(--border);">
            <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px;">
                <p style="color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-weight: 600;">
                    <i class="bi bi-boxes"></i> &nbsp;Miqdori
                </p>
                <p style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--white); margin: 0; letter-spacing: -1px;">{{ phon.quantity }}<span style="font-size: 0.9rem; color: var(--muted); font-weight: 400; margin-left: 4px;">ta</span></p>
            </div>
            <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px;">
                <p style="color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-weight: 600;">
                    <i class="bi bi-cash-stack"></i> &nbsp;Narxi
                </p>
                <p style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--accent2); margin: 0; letter-spacing: -1px;">{{ phon.price }}<span style="font-size: 0.9rem; color: var(--muted); font-weight: 400; margin-left: 4px;">mln</span></p>
            </div>
        </div>
 
        <!-- Actions -->
        <div style="padding: 20px 28px; display: flex; gap: 10px; justify-content: flex-end;">
            <a href="{% url 'phone_update' phon.pk %}" class="btn-warning-soft">
                <i class="bi bi-pencil-fill"></i> Tahrirlash
            </a>
            <a href="{% url 'phone_delete' phon.pk %}" class="btn-danger-soft">
                <i class="bi bi-trash3-fill"></i> O'chirish
            </a>
        </div>
    </div>
</div>
{% endblock %}
