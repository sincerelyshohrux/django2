{% extends 'base.html' %}

{% block content %}
<h1>{% if action == 'Create' %}Add New Task{% else %}Edit Task{% endif %}</h1>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label for="id_title">Title:</label>
        <input type="text" name="title" id="id_title" value="{{ form.title.value|default:'' }}" required>
    </div>

    <div class="form-group">
        <label for="id_description">Description:</label>
        <textarea name="description" id="id_description">{{ form.description.value|default:'' }}</textarea>
    </div>

    <div class="form-group">
        <div class="checkbox-group">
            <input type="checkbox" name="completed" id="id_completed" {% if form.completed.value %}checked{% endif %}>
            <label for="id_completed" style="margin: 0; font-weight: normal;">Mark as completed</label>
        </div>
    </div>

    <div>
        <a href="{% url 'task_list' %}" class="btn btn-back">Cancel</a>
        <button type="submit" class="btn btn-add">
            {% if action == 'Create' %}Create Task{% else %}Update Task{% endif %}
        </button>
    </div>
</form>
{% endblock %}
